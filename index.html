<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой тренажёр</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .instructions {
            text-align: center;
            color: #333;
            line-height: 1.6;
        }

        .instructions h2 {
            margin: 0 0 15px;
        }

        .instructions p {
            margin: 0;
            font-size: 18px;
        }

        #recordButton {
            width: 50vw;
            height: 50vw;
            max-width: 320px;
            max-height: 320px;

            border: none;
            border-radius: 50%;
            background: #2196F3;
            color: white;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: background .2s, transform .1s;
        }

        #recordButton.recording {
            background: #f44336;
        }

        #recordButton:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">

    <div class="instructions">
        <h2>🎤 Голосовой тренажёр</h2>

        <p>
            Нажмите и удерживайте кнопку для записи.<br>
            Пока удерживаете кнопку — говорите.<br>
            После отпускания запись сразу воспроизводится.<br>
            Следующее нажатие начинает новую запись.
        </p>
    </div>

    <button id="recordButton">Удерживай</button>

</div>

<script>
let mediaRecorder;
let chunks = [];
let stream;

const button = document.getElementById("recordButton");

async function init() {
    stream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });
}

async function startRecording() {
    if (!stream) {
        await init();
    }

    chunks = [];

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            chunks.push(e.data);
        }
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: "audio/webm" });

        const audio = new Audio(URL.createObjectURL(blob));
        audio.play();
    };

    mediaRecorder.start();

    button.classList.add("recording");
    button.textContent = "Запись...";
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
    }

    button.classList.remove("recording");
    button.textContent = "Удерживай";
}

button.addEventListener("pointerdown", async (e) => {
    e.preventDefault();
    await startRecording();
});

button.addEventListener("pointerup", stopRecording);
button.addEventListener("pointerleave", stopRecording);
button.addEventListener("pointercancel", stopRecording);
</script>

</body>
</html>
